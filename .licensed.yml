# See: https://github.com/licensee/licensed/blob/main/docs/configuration.md

sources:
  npm: true
  go: true

apps:
  - source_path: .
  - source_path: standalone-apps/app-lab-desktop

ignored:
  npm:
    # internal packages
    - "@cloud-editor-mono/**"
    - "@bcmi-labs/**"

    # The following packages have some optional (architecture native) packages.
    - "@esbuild/**"                           # packages released under MIT license
    - "@rollup/**"                            # packages released under MIT license
    - "@parcel/watcher-**"                    # ignored in favor of parent package "@parcel-watcher"
    - "fsevents"                              # optional package for file watching, released under MIT license (https://www.npmjs.com/package/fsevents)
    - "@img/sharp-**"                         # optional packages for image processing, released under Apache-2.0 license (https://github.com/lovell/sharp/blob/main/LICENSE)

    - "spdx-exceptions"                       # list of SPDX standard license exceptions, released under CC-BY-3.0 (https://github.com/jslicense/spdx-exceptions.json?tab=readme-ov-file#copyright-and-licensing)

# Source: https://github.com/arduino/tooling-project-assets/blob/main/workflow-templates/assets/check-dependencies/GPL-3.0/.licensed.yml
allowed:
  - gpl-1.0-or-later
  - gpl-1.0+ # Deprecated ID for `gpl-1.0-or-later`
  - gpl-2.0-or-later
  - gpl-2.0+ # Deprecated ID for `gpl-2.0-or-later`
  - gpl-3.0-only
  - gpl-3.0 # Deprecated ID for `gpl-3.0-only`
  - gpl-3.0-or-later
  - gpl-3.0+ # Deprecated ID for `gpl-3.0-or-later`
  - lgpl-2.0-or-later
  - lgpl-2.0+ # Deprecated ID for `lgpl-2.0-or-later`
  - lgpl-2.1-only
  - lgpl-2.1 # Deprecated ID for `lgpl-2.1-only`
  - lgpl-2.1-or-later
  - lgpl-2.1+ # Deprecated ID for `lgpl-2.1-or-later`
  - lgpl-3.0-only
  - lgpl-3.0 # Deprecated ID for `lgpl-3.0-only`
  - lgpl-3.0-or-later
  - lgpl-3.0+ # Deprecated ID for `lgpl-3.0-or-later`
  - agpl-1.0-or-later
  - agpl-3.0-only
  - agpl-3.0 # Deprecated ID for `agpl-3.0-only`
  - agpl-3.0-or-later
  - apache-2.0
  - mit
  - bsd-2-clause # Subsumed by `bsd-2-clause-views`
  - bsd-2-clause-netbsd # Deprecated ID for `bsd-2-clause`
  - bsd-2-clause-views # This is the version linked from https://www.gnu.org/licenses/license-list.html#FreeBSD
  - bsd-2-clause-freebsd # Deprecated ID for `bsd-2-clause-views`
  - bsd-3-clause
  - bsd-3-clause-clear
  - isc
  - cc0-1.0
  - unlicense
  - mpl-2.0

  #- epl-2.0   # https://interoperable-europe.ec.europa.eu/licence/compatibility-check/EPL-2.0/AGPL-3.0-only
  - 0bsd      # https://interoperable-europe.ec.europa.eu/licence/compatibility-check/0bsd/GPL-3.0-only
  - cc-by-3.0 # https://interoperable-europe.ec.europa.eu/licence/compatibility-check/CC-BY-3.0/GPL-3.0-only
  - cc-by-4.0 # https://interoperable-europe.ec.europa.eu/licence/compatibility-check/CC-BY-4.0/GPL-3.0-only
  - blueoak-1.0.0
  - Python-2.0
  - OFL-1.1
